<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Calm Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-card .logo {
      width: 72px;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px var(--primary-glow));
    }

    .login-card h1 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .login-card .form-group {
      margin-bottom: 20px;
      text-align: right;
    }

    .login-card .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .login-card .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-ar);
      font-size: 15px;
      transition: border-color 0.3s;
      direction: ltr;
      text-align: left;
    }

    .login-card .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: var(--radius-sm);
      color: #06060e;
      font-family: var(--font-ar);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s var(--ease);
    }

    .login-btn:hover {
      box-shadow: 0 0 30px var(--primary-glow);
      transform: translateY(-2px);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .login-error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <img src="../assets/logo.png" alt="Calm Team" class="logo" />
      <h1>Admin Panel</h1>
      <p>تسجيل دخول لوحة التحكم</p>
      <form id="loginForm">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="loginEmail" placeholder="admin@calm.com" required />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    // Check if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginBtn.disabled = true;
      loginBtn.textContent = 'جاري تسجيل الدخول...';
      loginError.classList.remove('visible');

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        loginError.textContent = err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password'
          ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة'
          : 'حدث خطأ. حاول مرة أخرى';
        loginError.classList.add('visible');
        loginBtn.disabled = false;
        loginBtn.textContent = 'تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
