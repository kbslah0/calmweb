<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="store_title">منتجاتنا | Calm Team</title>
  <meta name="description" content="Calm Team Products - متجر فريق هدوء الرسمي" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#d6a566" />
  <meta property="og:title" content="منتجاتنا | Calm Team" />
  <meta property="og:description" content="Calm Team Products - متجر فريق هدوء الرسمي" />
  <meta property="og:image" content="https://kbslah0.github.io/calmweb/assets/logo.png" />
  <meta property="og:url" content="https://kbslah0.github.io/calmweb/products.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    .store-page {
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      padding: 100px 24px 60px;
    }

    .store-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(214,165,102,0.04), transparent 60%);
      pointer-events: none;
    }

    .store-toolbar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
      align-items: center;
    }

    .store-toolbar button {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-en);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      line-height: 1.4;
    }

    .store-toolbar button:hover {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .store-toolbar .theme-btn {
      width: 32px; height: 32px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border-radius: 50%;
    }

    .store-header {
      text-align: center;
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    .store-header .logo {
      width: 80px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 30px var(--primary-glow));
    }

    .store-header h1 {
      font-family: var(--font-en);
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 8px;
      text-shadow: 0 0 40px var(--primary-glow);
    }

    .store-header p {
      color: var(--text-muted);
      font-size: 16px;
      margin-top: 8px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      transition: all 0.4s var(--ease);
      position: relative;
      overflow: hidden;
    }

    .product-card:hover {
      border-color: var(--primary);
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .product-icon {
      font-size: 56px;
      margin-bottom: 16px;
      color: var(--primary);
    }

    .product-card h3 {
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .product-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .product-price {
      font-family: var(--font-en);
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .product-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 28px;
      border-radius: 50px;
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      font-family: var(--font-ar);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s var(--ease);
    }

    .product-btn:hover {
      background: var(--primary);
      color: #06060e;
      box-shadow: 0 0 30px var(--primary-glow);
    }

    .store-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 50px;
      font-family: var(--font-ar);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      transition: all 0.3s var(--ease);
      margin-top: 60px;
    }

    .store-back:hover {
      color: var(--primary);
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .store-footer {
      text-align: center;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .products-grid { grid-template-columns: 1fr; }
      .store-page { padding: 80px 16px 40px; }
    }
  </style>
</head>
<body>

  <div class="page-transition" id="pageTransition"></div>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <div class="store-page">
    <div class="store-toolbar" id="storeToolbar">
      <button id="storeLangToggle">EN</button>
      <button class="theme-btn" id="storeThemeToggle"><i class="fas fa-moon"></i></button>
    </div>

    <div class="store-header">
      <img src="assets/logo.png" alt="Calm Team" class="logo" />
      <h1 data-i18n="store_heading">Calm Team Store</h1>
      <p data-i18n="store_sub">المنتجات الرسمية لفريق هدوء</p>
    </div>

    <div class="products-grid" id="productsGrid">
      <!-- Products injected by JS -->
    </div>

    <div class="store-footer">
      <a href="index.html" class="store-back"><i class="fas fa-arrow-right"></i> <span data-i18n="store_back">العودة للرئيسية</span></a>
    </div>
  </div>

  <script>
    // =============================================
    // SYNC THEME & LANGUAGE
    // =============================================
    const savedTheme = localStorage.getItem('calm-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', savedTheme);

    const currentProductsLang = localStorage.getItem('calm-lang') || 'en';
    document.documentElement.lang = currentProductsLang;
    document.documentElement.dir = currentProductsLang === 'ar' ? 'rtl' : 'ltr';

    const productsData = [
      { icon: 'fa-solid fa-shirt', priceEn: '$29', priceAr: '29$' },
      { icon: 'fa-solid fa-hoodie', priceEn: '$49', priceAr: '49$' },
      { icon: 'fa-solid fa-hat-cowboy', priceEn: '$19', priceAr: '19$' },
      { icon: 'fa-solid fa-mug-hot', priceEn: '$15', priceAr: '15$' },
      { icon: 'fa-solid fa-computer-mouse', priceEn: '$12', priceAr: '12$' },
      { icon: 'fa-solid fa-sticker', priceEn: '$5', priceAr: '5$' }
    ];

    const storeTranslations = {
      en: {
        store_title: 'Store | Calm Team',
        store_heading: 'Calm Team Store',
        store_sub: 'Official Calm Team merchandise',
        store_back: 'Back to Home',
        prod_1_name: 'Calm T-Shirt',
        prod_1_desc: 'Premium quality t-shirt with Calm Team logo',
        prod_2_name: 'Calm Hoodie',
        prod_2_desc: 'Comfortable hoodie for the true fans',
        prod_3_name: 'Calm Cap',
        prod_3_desc: 'Stylish cap with embroidered logo',
        prod_4_name: 'Calm Mug',
        prod_4_desc: 'Start your day with Calm coffee',
        prod_5_name: 'Calm Mousepad',
        prod_5_desc: 'Pro gaming mousepad with Calm design',
        prod_6_name: 'Calm Sticker Pack',
        prod_6_desc: 'Set of 10 stickers for your gear',
        buy_btn: 'Buy Now'
      },
      ar: {
        store_title: 'منتجاتنا | Calm Team',
        store_heading: 'Calm Team Store',
        store_sub: 'المنتجات الرسمية لفريق هدوء',
        store_back: 'العودة للرئيسية',
        prod_1_name: 'تيشيرت Calm',
        prod_1_desc: 'تيشيرت جودة عالية بشعار الفريق',
        prod_2_name: 'هودي Calm',
        prod_2_desc: 'هودي مريح للجماهير الحقيقية',
        prod_3_name: 'كاب Calm',
        prod_3_desc: 'كاب أنيق بتطريز الشعار',
        prod_4_name: 'كوب Calm',
        prod_4_desc: 'ابدأ يومك مع قهوة هدوء',
        prod_5_name: 'ماوس باد Calm',
        prod_5_desc: 'ماوس باد احترافي بتصميم كالم',
        prod_6_name: 'باقة ستيكرات Calm',
        prod_6_desc: 'مجموعة 10 ستيكرات لأجهزتك',
        buy_btn: 'اشتري الآن'
      }
    };

    function renderProducts(lang) {
      const t = storeTranslations[lang];
      const grid = document.getElementById('productsGrid');
      if (!grid) return;
      grid.innerHTML = productsData.map((p, i) => `
        <div class="product-card" data-reveal>
          <div class="product-icon"><i class="${p.icon}"></i></div>
          <h3>${t['prod_' + (i+1) + '_name']}</h3>
          <p>${t['prod_' + (i+1) + '_desc']}</p>
          <div class="product-price">${lang === 'en' ? p.priceEn : p.priceAr}</div>
          <a href="#" class="product-btn" data-i18n="${'buy_btn'}">${t.buy_btn} <i class="fas fa-shopping-cart"></i></a>
        </div>
      `).join('');
    }

    function applyStoreLang(lang) {
      renderProducts(lang);
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (storeTranslations[lang][key] !== undefined) el.textContent = storeTranslations[lang][key];
      });
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      localStorage.setItem('calm-lang', lang);
      const btn = document.getElementById('storeLangToggle');
      if (btn) btn.textContent = lang === 'en' ? 'AR' : 'EN';
    }
    applyStoreLang(currentProductsLang);

    document.getElementById('storeLangToggle')?.addEventListener('click', () => {
      const newLang = localStorage.getItem('calm-lang') === 'en' ? 'ar' : 'en';
      applyStoreLang(newLang);
    });

    const themeBtn = document.getElementById('storeThemeToggle');
    function applyStoreTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('calm-theme', theme);
      if (themeBtn) themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }
    applyStoreTheme(savedTheme);
    themeBtn?.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      applyStoreTheme(cur === 'dark' ? 'light' : 'dark');
    });

    // =============================================
    // CURSOR
    // =============================================
    const cursor = document.getElementById('cursor');
    const cursorTrail = document.getElementById('cursorTrail');
    if (cursor && cursorTrail && window.innerWidth > 768) {
      let trailX = 0, trailY = 0;
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        trailX = e.clientX; trailY = e.clientY;
      });
      let tX = 0, tY = 0;
      function updateTrail() {
        tX += (trailX - tX) * 0.08;
        tY += (trailY - tY) * 0.08;
        cursorTrail.style.left = tX + 'px';
        cursorTrail.style.top = tY + 'px';
        requestAnimationFrame(updateTrail);
      }
      updateTrail();
      const targets = document.querySelectorAll('a, button, .product-card');
      targets.forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });
      document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%, -50%) scale(0.8)');
      document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');
    } else if (cursor && cursorTrail) {
      cursor.style.display = 'none';
      cursorTrail.style.display = 'none';
    }

    // Page transition
    const transOverlay = document.getElementById('pageTransition');
    if (transOverlay) {
      document.querySelectorAll('a[href$=".html"]').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const href = link.getAttribute('href');
          transOverlay.classList.add('active');
          setTimeout(() => { window.location.href = href; }, 350);
        });
      });
      window.addEventListener('pageshow', () => transOverlay.classList.remove('active'));
    }

    // Reveal observer for product cards
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('[data-reveal]').forEach(el => revealObserver.observe(el));
  </script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
