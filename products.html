<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منتجاتنا | Calm Team</title>
  <meta name="description" content="Calm Team Products - متجر فريق هدوء الرسمي" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <meta property="og:title" content="منتجاتنا | Calm Team" />
  <meta property="og:description" content="Calm Team Products - متجر فريق هدوء الرسمي" />
  <meta property="og:image" content="https://kbslah0.github.io/calmweb/assets/logo.png" />
  <meta property="og:url" content="https://kbslah0.github.io/calmweb/products.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    .products-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .products-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(214,165,102,0.06), transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(214,165,102,0.04), transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(214,165,102,0.03), transparent 40%);
      pointer-events: none;
    }

    .products-logo {
      display: block;
      margin: 0 auto 48px;
      width: 120px;
      height: auto;
      animation: productFloat 2.5s var(--ease) infinite;
      filter: drop-shadow(0 0 40px var(--primary-glow));
    }

    .products-container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 40px 24px;
      animation: pageFadeIn 1s var(--ease) both;
    }

    @keyframes pageFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

.products-title {
      font-family: var(--font-en);
      font-size: clamp(56px, 10vw, 120px);
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 16px;
      text-shadow: 0 0 50px var(--primary-glow), 0 0 100px var(--primary-glow);
      animation: titleGlow 2s var(--ease) infinite;
      position: relative;
      margin-bottom: 24px;
    }

    .products-title::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      -webkit-text-stroke: 2px var(--primary);
      color: transparent;
      opacity: 0.12;
      z-index: -1;
      letter-spacing: 20px;
    }

    @keyframes titleGlow {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.85; }
    }

    .products-bar-wrap {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto 28px;
    }

    .products-bar-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--primary-light));
      animation: barSweep 2s var(--ease) infinite;
      transform-origin: left;
    }

    @keyframes barSweep {
      0% { transform: scaleX(0); }
      50% { transform: scaleX(1); }
      100% { transform: scaleX(0); transform-origin: right; }
    }

    .products-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto 36px;
      line-height: 2;
    }

    .products-dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 48px;
    }

    .products-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      animation: dotBounce 1.4s var(--ease) infinite;
    }

    .products-dots span:nth-child(2) { animation-delay: 0.2s; }
    .products-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-14px); opacity: 1; }
    }

    .products-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 50px;
      font-family: var(--font-ar);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      transition: all 0.3s var(--ease);
    }

    .products-back:hover {
      color: var(--primary);
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .products-particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .products-particles span {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0;
      animation: particleFall 6s linear infinite;
    }

    .products-particles span:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 7s; }
    .products-particles span:nth-child(2) { left: 25%; animation-delay: 1s; animation-duration: 5s; }
    .products-particles span:nth-child(3) { left: 40%; animation-delay: 2s; animation-duration: 8s; }
    .products-particles span:nth-child(4) { left: 55%; animation-delay: 0.5s; animation-duration: 6s; }
    .products-particles span:nth-child(5) { left: 70%; animation-delay: 3s; animation-duration: 7s; }
    .products-particles span:nth-child(6) { left: 85%; animation-delay: 1.5s; animation-duration: 5s; }
    .products-particles span:nth-child(7) { left: 50%; animation-delay: 2.5s; animation-duration: 6s; }
    .products-particles span:nth-child(8) { left: 15%; animation-delay: 4s; animation-duration: 8s; }

    @keyframes particleFall {
      0% { transform: translateY(-20px) scale(0); opacity: 0; }
      20% { opacity: 0.6; transform: translateY(0) scale(1); }
      80% { opacity: 0.6; }
      100% { transform: translateY(100vh) scale(0); opacity: 0; }
    }

    /* Page transition overlay already in body */

  /* Products toolbar */
  .products-toolbar {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
  }

  .products-toolbar button {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-en);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    line-height: 1.4;
  }

  .products-toolbar button:hover {
    border-color: var(--primary);
    color: var(--primary);
    box-shadow: 0 0 20px var(--primary-glow);
  }

  .products-toolbar .theme-btn {
    width: 32px;
    height: 32px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    border-radius: 50%;
  }

  @keyframes productFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
    }
  </style>
</head>
<body>

  <div class="page-transition" id="pageTransition"></div>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <div class="products-page">
    <div class="products-toolbar" id="productsToolbar">
      <button id="productsLangToggle">EN</button>
      <button class="theme-btn" id="productsThemeToggle"><i class="fas fa-moon"></i></button>
    </div>
    <div class="products-particles">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="products-container">
      <img src="assets/logo.png" alt="Calm Team" class="products-logo" loading="lazy" />
      <h1 class="products-title" data-text="قريبا" data-i18n="products_title">قريبا</h1>
      <div class="products-bar-wrap"><div class="products-bar-fill"></div></div>
      <p class="products-desc" data-i18n-html="products_desc">
         نعمل على إطلاق منتجات حصرية لفريق Calm Team<br />
        تيشيرتات — هوديز — إكسسوارات — وأكثر<br />
        <strong style="color: var(--primary);">ترقبوا!</strong>
      </p>
      <div class="products-dots">
        <span></span><span></span><span></span>
      </div>
      <a href="index.html" class="products-back"><i class="fas fa-arrow-right"></i> <span data-i18n="products_back">العودة للرئيسية</span></a>
    </div>
  </div>


<script>
  // =============================================
  // SYNC THEME & LANGUAGE
  // =============================================
  const savedTheme = localStorage.getItem('calm-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', savedTheme);

  const productsTranslations = {
    en: {
      products_title: 'Coming Soon',
      products_desc: 'We are launching exclusive products for Calm Team<br />T-shirts — Hoodies — Accessories — & More<br /><strong style="color: var(--primary);">Stay Tuned!</strong>',
      products_back: 'Back to Home'
    },
    ar: {
      products_title: 'قريبا',
      products_desc: 'نعمل على إطلاق منتجات حصرية لفريق Calm Team<br />تيشيرتات — هوديز — إكسسوارات — وأكثر<br /><strong style="color: var(--primary);">ترقبوا!</strong>',
      products_back: 'العودة للرئيسية'
    }
  };

  let currentProductsLang = localStorage.getItem('calm-lang') || 'en';
  document.documentElement.lang = currentProductsLang;
  document.documentElement.dir = currentProductsLang === 'ar' ? 'rtl' : 'ltr';

  function applyProductsLang(lang) {
    currentProductsLang = lang;
    const t = productsTranslations[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    localStorage.setItem('calm-lang', lang);
    const btn = document.getElementById('productsLangToggle');
    if (btn) btn.textContent = lang === 'en' ? 'AR' : 'EN';
    // Update title data-text attr for glow effect
    const title = document.querySelector('.products-title');
    if (title) title.setAttribute('data-text', t.products_title);
  }
  applyProductsLang(currentProductsLang);

  document.getElementById('productsLangToggle')?.addEventListener('click', () => {
    applyProductsLang(currentProductsLang === 'en' ? 'ar' : 'en');
  });

  const themeBtn = document.getElementById('productsThemeToggle');
  function applyProductsTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('calm-theme', theme);
    if (themeBtn) themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
  }
  applyProductsTheme(savedTheme);
  themeBtn?.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    applyProductsTheme(cur === 'dark' ? 'light' : 'dark');
  });

  // =============================================
  // CURSOR
  // =============================================
  const cursor = document.getElementById('cursor');
  const cursorTrail = document.getElementById('cursorTrail');
  if (cursor && cursorTrail && window.innerWidth > 768) {
    let trailX = 0, trailY = 0;
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      trailX = e.clientX; trailY = e.clientY;
    });
    let tX = 0, tY = 0;
    function updateTrail() {
      tX += (trailX - tX) * 0.08;
      tY += (trailY - tY) * 0.08;
      cursorTrail.style.left = tX + 'px';
      cursorTrail.style.top = tY + 'px';
      requestAnimationFrame(updateTrail);
    }
    updateTrail();
    const targets = document.querySelectorAll('a, button, .products-logo, .products-title, .products-back');
    targets.forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
    document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%, -50%) scale(0.8)');
    document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');
  } else if (cursor && cursorTrail) {
    cursor.style.display = 'none';
    cursorTrail.style.display = 'none';
  }

  // Page transition
  const transOverlay = document.getElementById('pageTransition');
  if (transOverlay) {
    document.querySelectorAll('a[href$=".html"]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const href = link.getAttribute('href');
        transOverlay.classList.add('active');
        setTimeout(() => { window.location.href = href; }, 350);
      });
    });
    window.addEventListener('pageshow', () => transOverlay.classList.remove('active'));
  }
</script>
</body>
</html>
